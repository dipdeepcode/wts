name: Deploy Web-ui

on:
  push:
    branches:
      - master
    paths:
      - 'web-ui/**'
      - '.github/workflows/deploy_web-ui.yml'
  # Автоматический запуск после успешного деплоя шлюза
  workflow_run:
    workflows: ["Deploy Gateway"]
    types:
      - completed

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest

    # Запускаем только при пуше или если шлюз деплоился и завершился успехом
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        working-directory: web-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build -- --configuration=production

      - name: Deploy to VDS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "web-ui/dist/web-ui/browser/*"
          target: "/var/www/dipdeepcode/data/www/dipdeepcode.ru"
          strip_components: 4
          rm: true










