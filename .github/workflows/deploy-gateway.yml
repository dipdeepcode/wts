name: Deploy Gateway

on:
  push:
    branches:
      - master
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'
  workflow_run:
    workflows: ["Deploy Infrastructure (Postgres, Keycloak)"]
    types:
      - completed
permissions: {}

jobs:
  deploy-gateway:
    name: Deploy gateway
    environment: production
    permissions:
      contents: read
    runs-on: ubuntu-22.04

    # Если запуск произошел через workflow_run, проверяем, что предыдущий шаг завершился именно УСПЕШНО
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # 1. Очищаем только папку gateway на сервере, оставляя базу и iam нетронутыми
      - name: Prepare Gateway Directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            rm -rf ${{ vars.SERVER_INFRA_PATH }}/gateway

      # 2. Копируем docker-compose.yml и обновленную папку gateway на VDS
      - name: Copy Gateway Files to VDS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml,gateway/**"
          target: "${{ vars.SERVER_INFRA_PATH }}"

      # 3. Пересобираем и перезапускаем ТОЛЬКО контейнер gateway
      - name: Rebuild and Restart Gateway via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GATEWAY_CLIENT_ID: ${{ secrets.GATEWAY_CLIENT_ID }}
          GATEWAY_CLIENT_SECRET: ${{ secrets.GATEWAY_CLIENT_SECRET }}
          SESSIONS_DB_NAME: ${{ vars.SESSIONS_DB_NAME }}
          SESSIONS_DB_USER: ${{ secrets.SESSIONS_DB_USER }}
          SESSIONS_DB_PASS: ${{ secrets.SESSIONS_DB_PASS }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          KC_HOSTNAME: ${{ vars.KC_HOSTNAME }}
          KC_REALM_NAME: ${{ vars.KC_REALM_NAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GATEWAY_CLIENT_ID,GATEWAY_CLIENT_SECRET,SESSIONS_DB_NAME,SESSIONS_DB_USER,SESSIONS_DB_PASS,FRONTEND_URL,KC_HOSTNAME,KC_REALM_NAME
          script: |
            cd "${{ vars.SERVER_INFRA_PATH }}"
            
            docker compose up -d --build gateway
