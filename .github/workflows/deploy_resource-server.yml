name: Deploy Resource-server

on:
  push:
    branches:
      - master
    paths:
      - 'resource-server/**'
      - '.github/workflows/deploy_resource-server.yml'
  workflow_run:
    workflows:
      - "Deploy Infrastructure (Postgres, Keycloak)"
    types:
      - completed
permissions: {}
env:
  RESOURCE-SERVER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wts_resource-server:latest

jobs:
  deploy-resource-server:
    name: Deploy resource-server
    environment: production
    permissions:
      contents: read
    runs-on: ubuntu-22.04

    # Если запуск произошел через workflow_run, проверяем, что предыдущий шаг завершился именно УСПЕШНО
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./resource-server
          push: true
          tags: ${{ env.RESOURCE-SERVER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml to VDS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ vars.SERVER_PROJECT_PATH }}"

      - name: Deploy to VDS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_DB_NAME: ${{ vars.BACKEND_DB_NAME }}
          BACKEND_DB_USER: ${{ secrets.BACKEND_DB_USER }}
          BACKEND_DB_PASS: ${{ secrets.BACKEND_DB_PASS }}
          RESOURCE-SERVER_IMAGE: ${{ env.RESOURCE-SERVER_IMAGE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: BACKEND_DB_NAME,BACKEND_DB_USER,BACKEND_DB_PASS,RESOURCE-SERVER_IMAGE
          script: |
            cd "${{ vars.SERVER_PROJECT_PATH }}"
            docker compose pull resource-server
            docker compose up -d --no-deps resource-server
            docker image prune -f





