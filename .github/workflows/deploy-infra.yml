name: Deploy Infrastructure (Postgres, Keycloak)

on:
  push:
    branches:
      - master
    paths:
      - 'docker-compose.yml'
      - 'database/**'
      - 'iam/**'
      - '.github/workflows/deploy-infra.yml'

jobs:
  deploy-infra:
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Очистка целевых папок инфраструктуры на сервере перед копированием файлов
      - name: Prepare Directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ${{ vars.SERVER_INFRA_PATH }}
            rm -rf ${{ vars.SERVER_INFRA_PATH }}/database
            rm -rf ${{ vars.SERVER_INFRA_PATH }}/iam

      # 2. Копируем конфигурации и папки со всеми вложенными файлами на VDS
      - name: Copy Config and Source Files to VDS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml,database/**,iam/**"
          target: "${{ vars.SERVER_INFRA_PATH }}"

      # 3. Пересобираем образы и запускаем контейнеры с передачей секретов
      - name: Build and Start Infrastructure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Присваиваем значение в bash-переменную для удобства работы внутри скрипта
            INFRA_PATH="${{ vars.SERVER_INFRA_PATH }}"
            cd "$INFRA_PATH"
            
            sed -i 's/\r$//' database/init_db.sh 2>/dev/null || true
            
            # Секреты для БД
            export POSTGRES_USER="${{ secrets.ROOT_DB_USER }}"
            export POSTGRES_PASS="${{ secrets.ROOT_DB_PASS }}"
            export IAM_DB_USER="${{ secrets.IAM_DB_USER }}"
            export IAM_DB_PASS="${{ secrets.IAM_DB_PASS }}"
            export IAM_DB_NAME="${{ vars.IAM_DB_NAME }}"
            export SESSIONS_DB_USER="${{ secrets.SESSIONS_DB_USER }}"
            export SESSIONS_DB_PASS="${{ secrets.SESSIONS_DB_PASS }}"
            export SESSIONS_DB_NAME="${{ vars.SESSIONS_DB_NAME }}"
            export BACKEND_DB_USER="${{ secrets.BACKEND_DB_USER }}"
            export BACKEND_DB_PASS="${{ secrets.BACKEND_DB_PASS }}"
            export BACKEND_DB_NAME="${{ vars.BACKEND_DB_NAME }}"
            
            # Секреты для Keycloak
            export KEYCLOAK_ADMIN_USER="${{ secrets.KEYCLOAK_ADMIN_USER }}"
            export KEYCLOAK_ADMIN_PASS="${{ secrets.KEYCLOAK_ADMIN_PASS }}"
            
            # Окружение хоста для работы за Nginx прокси
            export KC_HOSTNAME="${{ vars.KC_HOSTNAME }}"
            
            # Принудительно останавливаем, пересобираем все три кастомных образа и запускаем в фоне
            docker compose down
            docker compose up -d --build
