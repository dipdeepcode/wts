name: Deploy Infrastructure (Postgres, Keycloak)

on: workflow_dispatch
permissions: {}

jobs:
  deploy-infra:
    name: Deploy infrastructure
    environment: production
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # 1. Очистка целевых папок инфраструктуры на сервере
      - name: Prepare Directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ${{ vars.SERVER_INFRA_PATH }}
            rm -rf ${{ vars.SERVER_INFRA_PATH }}/database
            rm -rf ${{ vars.SERVER_INFRA_PATH }}/iam

      # 2. Копируем конфигурации на VDS
      - name: Copy Config and Source Files to VDS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.infra.yml,database/**,iam/**"
          target: "${{ vars.SERVER_INFRA_PATH }}"

      # 3. Запуск инфраструктуры с прямой передачей переменных
      - name: Build and Start Infrastructure via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.ROOT_DB_USER }}
          POSTGRES_PASS: ${{ secrets.ROOT_DB_PASS }}
          IAM_DB_USER: ${{ secrets.IAM_DB_USER }}
          IAM_DB_PASS: ${{ secrets.IAM_DB_PASS }}
          IAM_DB_NAME: ${{ vars.IAM_DB_NAME }}
          SESSIONS_DB_USER: ${{ secrets.SESSIONS_DB_USER }}
          SESSIONS_DB_PASS: ${{ secrets.SESSIONS_DB_PASS }}
          SESSIONS_DB_NAME: ${{ vars.SESSIONS_DB_NAME }}
          BACKEND_DB_USER: ${{ secrets.BACKEND_DB_USER }}
          BACKEND_DB_PASS: ${{ secrets.BACKEND_DB_PASS }}
          BACKEND_DB_NAME: ${{ vars.BACKEND_DB_NAME }}
          KEYCLOAK_ADMIN_USER: ${{ secrets.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASS: ${{ secrets.KEYCLOAK_ADMIN_PASS }}
          KC_HOSTNAME: ${{ vars.KC_HOSTNAME }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          KC_REALM_NAME: ${{ vars.KC_REALM_NAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: POSTGRES_USER,POSTGRES_PASS,IAM_DB_USER,IAM_DB_PASS,IAM_DB_NAME,SESSIONS_DB_USER,SESSIONS_DB_PASS,SESSIONS_DB_NAME,BACKEND_DB_USER,BACKEND_DB_PASS,BACKEND_DB_NAME,KEYCLOAK_ADMIN_USER,KEYCLOAK_ADMIN_PASS,KC_HOSTNAME,FRONTEND_URL,KC_REALM_NAME
          script: |
            cd "${{ vars.SERVER_INFRA_PATH }}"

            docker network create db_net 2>/dev/null || true
            docker network create iam_net 2>/dev/null || true
            
            docker compose down --remove-orphans || true
            
            docker compose -f docker-compose.infra.yml up -d --build
