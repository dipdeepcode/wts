name: Deploy Infrastructure (Postgres, Keycloak)

on: workflow_dispatch
permissions: {}
env:
  POSTGRES_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wts_postgres:17.4-alpine
  KEYCLOAK_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/wts_keycloak:26.7.0

jobs:
  deploy-infra:
    name: Deploy infrastructure
    environment: production
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Postgres Image
        uses: docker/build-push-action@v7
        with:
          context: ./database
          push: true
          tags: ${{ env.POSTGRES_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Keycloak Image
        uses: docker/build-push-action@v7
        with:
          context: ./iam
          push: true
          tags: ${{ env.KEYCLOAK_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare Directory via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ${{ vars.SERVER_PROJECT_PATH }}

      - name: Copy Config Files to VDS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml"
          target: "${{ vars.SERVER_PROJECT_PATH }}"


      - name: Pull and Start Infrastructure via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.ROOT_DB_USER }}
          POSTGRES_PASS: ${{ secrets.ROOT_DB_PASS }}
          IAM_DB_USER: ${{ secrets.IAM_DB_USER }}
          IAM_DB_PASS: ${{ secrets.IAM_DB_PASS }}
          IAM_DB_NAME: ${{ vars.IAM_DB_NAME }}
          SESSIONS_DB_USER: ${{ secrets.SESSIONS_DB_USER }}
          SESSIONS_DB_PASS: ${{ secrets.SESSIONS_DB_PASS }}
          SESSIONS_DB_NAME: ${{ vars.SESSIONS_DB_NAME }}
          BACKEND_DB_USER: ${{ secrets.BACKEND_DB_USER }}
          BACKEND_DB_PASS: ${{ secrets.BACKEND_DB_PASS }}
          BACKEND_DB_NAME: ${{ vars.BACKEND_DB_NAME }}
          KEYCLOAK_ADMIN_USER: ${{ secrets.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASS: ${{ secrets.KEYCLOAK_ADMIN_PASS }}
          KC_HOSTNAME: ${{ vars.KC_HOSTNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_IMAGE: ${{ env.POSTGRES_IMAGE }}
          KEYCLOAK_IMAGE: ${{ env.KEYCLOAK_IMAGE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: POSTGRES_USER,POSTGRES_PASS,IAM_DB_USER,IAM_DB_PASS,IAM_DB_NAME,SESSIONS_DB_USER,SESSIONS_DB_PASS,SESSIONS_DB_NAME,BACKEND_DB_USER,BACKEND_DB_PASS,BACKEND_DB_NAME,KEYCLOAK_ADMIN_USER,KEYCLOAK_ADMIN_PASS,KC_HOSTNAME,DOCKERHUB_TOKEN,DOCKERHUB_USERNAME,POSTGRES_IMAGE,KEYCLOAK_IMAGE
          script: |
            cd "${{ vars.SERVER_PROJECT_PATH }}"

            # Создаем сети, если их нет
            docker network create db_net 2>/dev/null || true
            docker network create iam_net 2>/dev/null || true
            
            # Скачиваем новые версии образов, которые только что собрал GitHub
            docker compose -f docker-compose.yml pull
            
            # Перезапускаем контейнеры (флаг --build убран, так как сборка больше не нужна)
            docker compose -f docker-compose.yml up -d --remove-orphans database iam
            
            # Чистим старые неиспользуемые слои образов на VDS
            docker image prune -f