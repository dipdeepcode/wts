services:

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: ${IMAGE}
    container_name: wts_gateway
    restart: unless-stopped
    environment:
      TZ: Europe/Moscow
      SESSIONS_DB_NAME: ${SESSIONS_DB_NAME}
      SESSIONS_DB_USER: ${SESSIONS_DB_USER}
      SESSIONS_DB_PASS: ${SESSIONS_DB_PASS}
      GATEWAY_CLIENT_ID: ${GATEWAY_CLIENT_ID}
      GATEWAY_CLIENT_SECRET: ${GATEWAY_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_REALM_NAME: ${KC_REALM_NAME}
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - db_net
      - iam_net
    extra_hosts:
      - "auth.dipdeepcode.ru:212.109.223.138"

networks:
  db_net:
    name: db_net
    external: true
  iam_net:
    name: iam_net
    external: true
